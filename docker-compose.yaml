networks:
  openstatus:
    driver: bridge
    name: openstatus

volumes:
  libsql-data:
    name: openstatus-libsql-data
  workflows-data:
    name: openstatus-workflows-data

services:
  libsql:
    container_name: openstatus-libsql
    image: ghcr.io/tursodatabase/libsql-server:latest
    networks:
      - openstatus
    ports:
      - "8080:8080"
      - "5001:5001"
    volumes:
      - libsql-data:/var/lib/sqld
    environment:
      SQLD_NODE: primary
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "perl -e 'use IO::Socket::INET; exit(IO::Socket::INET->new(PeerAddr=>\"127.0.0.1:8080\",Timeout=>1) ? 0 : 1);'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  tinybird-local:
    container_name: openstatus-tinybird
    image: tinybirdco/tinybird-local:latest
    platform: linux/amd64
    networks:
      - openstatus
    ports:
      - "7181:7181"
    environment:
      COMPATIBILITY_MODE: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7181/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  workflows:
    container_name: openstatus-workflows
    build:
      context: .
      dockerfile: apps/workflows/Dockerfile
    image: openstatus/workflows:latest
    networks:
      - openstatus
    volumes:
      - workflows-data:/app/data
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      QSTASH_CURRENT_SIGNING_KEY: ${QSTASH_CURRENT_SIGNING_KEY}
      QSTASH_NEXT_SIGNING_KEY: ${QSTASH_NEXT_SIGNING_KEY}
      QSTASH_TOKEN: ${QSTASH_TOKEN}
      QSTASH_URL: ${QSTASH_URL}
      TINY_BIRD_API_KEY: ${TINY_BIRD_API_KEY}
      TINYBIRD_URL: ${TINYBIRD_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      AUTH_SECRET: ${AUTH_SECRET}
      SELF_HOST: ${SELF_HOST}
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_LOCATION: ${GCP_LOCATION}
      GCP_CLIENT_EMAIL: ${GCP_CLIENT_EMAIL}
      GCP_PRIVATE_KEY: ${GCP_PRIVATE_KEY}
      CRON_SECRET: ${CRON_SECRET}
      UNKEY_API_ID: ${UNKEY_API_ID}
      UNKEY_TOKEN: ${UNKEY_TOKEN}
      SUPER_ADMIN_TOKEN: ${SUPER_ADMIN_TOKEN}
      FLY_REGION: ${FLY_REGION}
      SCREENSHOT_SERVICE_URL: ${SCREENSHOT_SERVICE_URL}
      OPENSTATUS_INGEST_URL: ${OPENSTATUS_INGEST_URL}
      NODE_ENV: ${NODE_ENV}
      TURBO_ENV_MODE: ${TURBO_ENV_MODE}
      PLAYGROUND_UNKEY_API_KEY: ${PLAYGROUND_UNKEY_API_KEY}
      WORKSPACES_LOOKBACK_30: ${WORKSPACES_LOOKBACK_30}
      WORKSPACES_HIDE_URL: ${WORKSPACES_HIDE_URL}
      PORT: "3000"
    depends_on:
      libsql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  server:
    container_name: openstatus-server
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: openstatus/server:latest
    networks:
      - openstatus
    ports:
      - "3001:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      QSTASH_CURRENT_SIGNING_KEY: ${QSTASH_CURRENT_SIGNING_KEY}
      QSTASH_NEXT_SIGNING_KEY: ${QSTASH_NEXT_SIGNING_KEY}
      QSTASH_TOKEN: ${QSTASH_TOKEN}
      QSTASH_URL: ${QSTASH_URL}
      TINY_BIRD_API_KEY: ${TINY_BIRD_API_KEY}
      TINYBIRD_URL: ${TINYBIRD_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      AUTH_SECRET: ${AUTH_SECRET}
      SELF_HOST: ${SELF_HOST}
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCP_LOCATION: ${GCP_LOCATION}
      GCP_CLIENT_EMAIL: ${GCP_CLIENT_EMAIL}
      GCP_PRIVATE_KEY: ${GCP_PRIVATE_KEY}
      CRON_SECRET: ${CRON_SECRET}
      UNKEY_API_ID: ${UNKEY_API_ID}
      UNKEY_TOKEN: ${UNKEY_TOKEN}
      SUPER_ADMIN_TOKEN: ${SUPER_ADMIN_TOKEN}
      FLY_REGION: ${FLY_REGION}
      SCREENSHOT_SERVICE_URL: ${SCREENSHOT_SERVICE_URL}
      OPENSTATUS_INGEST_URL: ${OPENSTATUS_INGEST_URL}
      NODE_ENV: ${NODE_ENV}
      TURBO_ENV_MODE: ${TURBO_ENV_MODE}
      PLAYGROUND_UNKEY_API_KEY: ${PLAYGROUND_UNKEY_API_KEY}
      WORKSPACES_LOOKBACK_30: ${WORKSPACES_LOOKBACK_30}
      WORKSPACES_HIDE_URL: ${WORKSPACES_HIDE_URL}
      PORT: "3000"
    depends_on:
      workflows:
        condition: service_healthy
      libsql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  private-location:
    container_name: openstatus-private-location
    build:
      context: apps/private-location
      dockerfile: Dockerfile
    image: openstatus/private-location:latest
    networks:
      - openstatus
    ports:
      - "8081:8080"
    environment:
      DB_URL: ${DATABASE_URL}
      TINYBIRD_URL: http://tinybird-local:7181
      GIN_MODE: release
      PORT: "8080"
      OPENSTATUS_INGEST_URL: ${OPENSTATUS_INGEST_URL}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:8080/health",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  dashboard:
    container_name: openstatus-dashboard
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    image: openstatus/dashboard:latest
    networks:
      - openstatus
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN}
      TINY_BIRD_API_KEY: ${TINY_BIRD_API_KEY}
      TINYBIRD_URL: ${TINYBIRD_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      AUTH_SECRET: ${AUTH_SECRET}
      SELF_HOST: ${SELF_HOST}
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET_KEY: ${STRIPE_WEBHOOK_SECRET_KEY}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      UNKEY_API_ID: ${UNKEY_API_ID}
      UNKEY_TOKEN: ${UNKEY_TOKEN}
      SUPER_ADMIN_TOKEN: ${SUPER_ADMIN_TOKEN}
      FLY_REGION: ${FLY_REGION}
      NODE_ENV: ${NODE_ENV}
      TURBO_ENV_MODE: ${TURBO_ENV_MODE}
      WORKSPACES_LOOKBACK_30: ${WORKSPACES_LOOKBACK_30}
      WORKSPACES_HIDE_URL: ${WORKSPACES_HIDE_URL}
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      AUTH_TRUST_HOST: "true"
    depends_on:
      workflows:
        condition: service_healthy
      libsql:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped

  status-page:
    container_name: openstatus-status-page
    build:
      context: .
      dockerfile: apps/status-page/Dockerfile
    image: openstatus/status-page:latest
    networks:
      - openstatus
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN}
      TINY_BIRD_API_KEY: ${TINY_BIRD_API_KEY}
      TINYBIRD_URL: ${TINYBIRD_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      SELF_HOST: ${SELF_HOST}
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET_KEY: ${STRIPE_WEBHOOK_SECRET_KEY}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
      NODE_ENV: ${NODE_ENV}
      TURBO_ENV_MODE: ${TURBO_ENV_MODE}
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      AUTH_TRUST_HOST: "true"
    depends_on:
      workflows:
        condition: service_healthy
      libsql:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped
