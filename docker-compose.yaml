networks:
  openstatus:
    driver: bridge
    name: openstatus

volumes:
  libsql-data:
    name: openstatus-libsql-data
  workflows-data:
    name: openstatus-workflows-data

services:
  libsql:
    container_name: openstatus-libsql
    image: ghcr.io/tursodatabase/libsql-server:latest
    networks:
      - openstatus
    ports:
      - "8080:8080"
      - "5001:5001"
    volumes:
      - libsql-data:/var/lib/sqld
    environment:
      SQLD_NODE: primary
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "perl -e 'use IO::Socket::INET; exit(IO::Socket::INET->new(PeerAddr=>\"127.0.0.1:8080\",Timeout=>1) ? 0 : 1);'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  tinybird-local:
    container_name: openstatus-tinybird
    image: tinybirdco/tinybird-local:latest
    platform: linux/amd64
    networks:
      - openstatus
    ports:
      - "7181:7181"
    environment:
      COMPATIBILITY_MODE: "1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7181/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  workflows:
    container_name: openstatus-workflows
    build:
      context: .
      dockerfile: apps/workflows/Dockerfile
    image: openstatus/workflows:latest
    networks:
      - openstatus
    volumes:
      - workflows-data:/app/data
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-http://libsql:8080}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN:-any-token}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-http://localhost:6379}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-placeholder}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-self-hosted}
      GCP_CLIENT_EMAIL: ${GCP_CLIENT_EMAIL:-dummy@example.com}
      GCP_PRIVATE_KEY: ${GCP_PRIVATE_KEY:-dummy}
      GCP_LOCATION: ${GCP_LOCATION:-us-central1}
      CRON_SECRET: ${CRON_SECRET:-dummy}
      SITE_URL: ${NEXT_PUBLIC_URL:-https://openstatus.pipjuice.io}
      RESEND_API_KEY: ${RESEND_API_KEY:-dummy}
      TINY_BIRD_API_KEY: ${TINY_BIRD_API_KEY:-dummy}
      QSTASH_TOKEN: ${QSTASH_TOKEN:-dummy}
      SCREENSHOT_SERVICE_URL: ${SCREENSHOT_SERVICE_URL:-dummy}
      TWILLIO_AUTH_TOKEN: ${TWILLIO_AUTH_TOKEN:-dummy}
      TWILLIO_ACCOUNT_ID: ${TWILLIO_ACCOUNT_ID:-dummy}
      SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-dummy}
      AXIOM_TOKEN: ${AXIOM_TOKEN:-dummy}
      AXIOM_DATASET: ${AXIOM_DATASET:-dummy}
      CHECKER_URL: ${CHECKER_URL:-http://checker:8080}
      PORT: "3000"
    depends_on:
      libsql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  checker:
    container_name: openstatus-checker
    build:
      context: apps/checker
      dockerfile: Dockerfile
    image: openstatus/checker:latest
    networks:
      - openstatus
    ports:
      - "8082:8080"
    environment:
      CRON_SECRET: ${CRON_SECRET:-dummy}
      TINYBIRD_TOKEN: ${TINYBIRD_TOKEN:-dummy}
      TINYBIRD_URL: ${TINYBIRD_URL:-http://tinybird-local:7181}
      WORKFLOWS_URL: ${WORKFLOWS_URL:-http://workflows:3000}
      CLOUD_PROVIDER: ${CLOUD_PROVIDER:-fly}
      FLY_REGION: ${FLY_REGION:-self-hosted}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      AXIOM_TOKEN: ${AXIOM_TOKEN:-dummy}
      AXIOM_DATASET: ${AXIOM_DATASET:-dummy}
      PORT: "8080"
    depends_on:
      workflows:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  server:
    container_name: openstatus-server
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    image: openstatus/server:latest
    networks:
      - openstatus
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-http://libsql:8080}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN:-any-token}
      UNKEY_API_ID: ${UNKEY_API_ID:-dummy}
      UNKEY_TOKEN: ${UNKEY_TOKEN:-dummy}
      TINY_BIRD_API_KEY: ${TINY_BIRD_API_KEY:-dummy}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-http://localhost:6379}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-placeholder}
      CRON_SECRET: ${CRON_SECRET:-dummy}
      SCREENSHOT_SERVICE_URL: ${SCREENSHOT_SERVICE_URL:-dummy}
      QSTASH_TOKEN: ${QSTASH_TOKEN:-dummy}
      SUPER_ADMIN_TOKEN: ${SUPER_ADMIN_TOKEN:-dummy}
      RESEND_API_KEY: ${RESEND_API_KEY:-dummy}
      AXIOM_TOKEN: ${AXIOM_TOKEN:-dummy}
      AXIOM_DATASET: ${AXIOM_DATASET:-dummy}
      CHECKER_URL: ${CHECKER_URL:-http://checker:8080}
      PORT: "3000"
    depends_on:
      workflows:
        condition: service_healthy
      libsql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ping || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  private-location:
    container_name: openstatus-private-location
    build:
      context: apps/private-location
      dockerfile: Dockerfile
    image: openstatus/private-location:latest
    networks:
      - openstatus
    ports:
      - "8081:8080"
    environment:
      DB_URL: ${DATABASE_URL:-http://libsql:8080}
      TINYBIRD_URL: ${TINYBIRD_URL:-http://tinybird-local:7181}
      TINYBIRD_TOKEN: ${TINYBIRD_TOKEN:-random-local-token}
      GIN_MODE: release
      PORT: "8080"
      OPENSTATUS_INGEST_URL: ${OPENSTATUS_INGEST_URL:-http://server:3000}
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--spider",
          "-q",
          "http://localhost:8080/health",
        ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  dashboard:
    container_name: openstatus-dashboard
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    image: openstatus/dashboard:latest
    networks:
      - openstatus
    ports:
      - "3002:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-http://libsql:8080}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN:-any-token}
      UPSTASH_REDIS_REST_URL: ${UPSTASH_REDIS_REST_URL:-http://localhost:6379}
      UPSTASH_REDIS_REST_TOKEN: ${UPSTASH_REDIS_REST_TOKEN:-placeholder}
      TINY_BIRD_API_KEY: ${TINY_BIRD_API_KEY:-dummy}
      TINYBIRD_URL: ${TINYBIRD_URL:-http://tinybird-local:7181}
      RESEND_API_KEY: ${RESEND_API_KEY:-dummy}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SELF_HOST: ${SELF_HOST:-true}
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL}
      CRON_SECRET: ${CRON_SECRET:-dummy}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-dummy}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-dummy}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-dummy}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-dummy}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-dummy}
      STRIPE_WEBHOOK_SECRET_KEY: ${STRIPE_WEBHOOK_SECRET_KEY:-dummy}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-dummy}
      UNKEY_API_ID: ${UNKEY_API_ID:-dummy}
      UNKEY_TOKEN: ${UNKEY_TOKEN:-dummy}
      PROJECT_ID_VERCEL: ${PROJECT_ID_VERCEL:-dummy}
      TEAM_ID_VERCEL: ${TEAM_ID_VERCEL:-dummy}
      VERCEL_AUTH_BEARER_TOKEN: ${VERCEL_AUTH_BEARER_TOKEN:-dummy}
      NEXT_PUBLIC_OPENPANEL_CLIENT_ID: ${NEXT_PUBLIC_OPENPANEL_CLIENT_ID:-dummy}
      OPENPANEL_CLIENT_SECRET: ${OPENPANEL_CLIENT_SECRET:-dummy}
      SUPER_ADMIN_TOKEN: ${SUPER_ADMIN_TOKEN:-dummy}
      FLY_REGION: ${FLY_REGION:-self-hosted}
      WORKSPACES_LOOKBACK_30: ${WORKSPACES_LOOKBACK_30:-}
      WORKSPACES_HIDE_URL: ${WORKSPACES_HIDE_URL:-}
      CHECKER_URL: ${CHECKER_URL:-http://checker:8080}
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      AUTH_TRUST_HOST: "true"
    depends_on:
      workflows:
        condition: service_healthy
      libsql:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped

  status-page:
    container_name: openstatus-status-page
    build:
      context: .
      dockerfile: apps/status-page/Dockerfile
    image: openstatus/status-page:latest
    networks:
      - openstatus
    ports:
      - "3003:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-http://libsql:8080}
      DATABASE_AUTH_TOKEN: ${DATABASE_AUTH_TOKEN:-any-token}
      TINY_BIRD_API_KEY: ${TINY_BIRD_API_KEY:-dummy}
      TINYBIRD_URL: ${TINYBIRD_URL:-http://tinybird-local:7181}
      RESEND_API_KEY: ${RESEND_API_KEY:-dummy}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      SELF_HOST: ${SELF_HOST:-true}
      NEXT_PUBLIC_URL: ${NEXT_PUBLIC_URL}
      CRON_SECRET: ${CRON_SECRET:-dummy}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-dummy}
      STRIPE_WEBHOOK_SECRET_KEY: ${STRIPE_WEBHOOK_SECRET_KEY:-dummy}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-dummy}
      UNKEY_API_ID: ${UNKEY_API_ID:-dummy}
      UNKEY_TOKEN: ${UNKEY_TOKEN:-dummy}
      CHECKER_URL: ${CHECKER_URL:-http://checker:8080}
      PROJECT_ID_VERCEL: ${PROJECT_ID_VERCEL:-dummy}
      TEAM_ID_VERCEL: ${TEAM_ID_VERCEL:-dummy}
      VERCEL_AUTH_BEARER_TOKEN: ${VERCEL_AUTH_BEARER_TOKEN:-dummy}
      NEXT_PUBLIC_OPENPANEL_CLIENT_ID: ${NEXT_PUBLIC_OPENPANEL_CLIENT_ID:-dummy}
      OPENPANEL_CLIENT_SECRET: ${OPENPANEL_CLIENT_SECRET:-dummy}
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      AUTH_TRUST_HOST: "true"
    depends_on:
      workflows:
        condition: service_healthy
      libsql:
        condition: service_healthy
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 45s
    restart: unless-stopped
